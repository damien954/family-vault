server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    location / { try_files $uri $uri/ /index.html; }
    location /api/ { proxy_pass http://backend:3001; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; client_max_body_size 50M; }
    location /uploads/ { proxy_pass http://backend:3001; expires 30d; }
}
